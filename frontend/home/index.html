<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CitizenFuture</title>
</head>
<body>
    
<header>
    <div class="bar">
        <img src="/frontend/img src/pngwing.com.png" alt="logo" class="logo">
        <div class="filtro">
            <label for="categorias">Filtrar por categoria:</label>
            <select id="categorias">
                <option value="">Todas</option>
                <option value="categoria1">Categoria 1</option>
                <option value="categoria2">Categoria 2</option>
                <option value="categoria3">Categoria 3</option>
            </select>
        </div>
        <input type="text" placeholder="Pesquisar" class="search-input">
        <nav class="nav-menu">
            <ul>
                <li><a href="#">Login</a></li>
            </ul>
        </nav>
    </div>
</header>

<main>
    <ul class="item-list">
        <li class="list-item" data-categoria="categoria1"></li>
        <li class="list-item" data-categoria="categoria2"></li>
        <li class="list-item" data-categoria="categoria3"></li>
        <li class="list-item" data-categoria="categoria1"></li>
        <li class="list-item" data-categoria="categoria2"></li>
        <li class="list-item" data-categoria="categoria3"></li>
        <li class="list-item" data-categoria="categoria1"></li>
        <li class="list-item" data-categoria="categoria1"></li>
    </ul>
</main>

<script src="script.js"></script>
</body>
</html>
